<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plombir Flowers</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Fonts: Nunito Sans ≈ Circe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,300;1,6..12,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="preconnect" href="https://pay.yandex.ru" crossorigin>
    <script src="https://pay.yandex.ru/sdk/v1/pay.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="/app/static/styles.css?v=37">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <button class="header__menu" id="btn-menu" onclick="openMenu()" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <button class="header__logo" id="header-logo" onclick="showScreen('catalog')" aria-label="На главную">
                <div class="header__logo-wrap">
                    <img src="/app/static/img/IMG_0415.PNG.webp" alt="Plombir Flowers"
                         onerror="this.style.display='none'; this.parentElement.nextElementSibling.style.display='inline';" />
                </div>
                <span style="display:none;">PLOMBIR <span class="header__logo-accent">flowers</span></span>
            </button>
            <button class="header__cart" id="btn-cart" onclick="openCart()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="3" y1="6" x2="21" y2="6" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 10a4 4 0 01-8 0" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="header__cart-badge" id="cart-badge" style="display:none;">0</span>
            </button>
        </header>

        <!-- ===== CATALOG SCREEN ===== -->
        <div class="screen" id="screen-catalog">
            <!-- Hero slider -->
            <section class="hero" id="hero">
                <div class="hero__track" id="hero-track"></div>
                <div class="hero__dots" id="hero-dots"></div>
            </section>

            <!-- Delivery ticker -->
            <section class="ticker" aria-label="Информация о доставке">
                <div class="ticker__inner" id="ticker-inner"></div>
            </section>

            <!-- Categories -->
            <nav class="categories" id="categories">
                <button class="category-btn active" data-id="">Все</button>
            </nav>

            <!-- Price filter -->
            <div class="price-filter" id="price-filter">
                <button class="price-btn active" data-min="" data-max="">Любая цена</button>
                <button class="price-btn" data-min="0" data-max="6000">до 6 000₽</button>
                <button class="price-btn" data-min="6000" data-max="10000">6 000–10 000₽</button>
                <button class="price-btn" data-min="10000" data-max="15000">10 000–15 000₽</button>
                <button class="price-btn" data-min="15000" data-max="25000">15 000–25 000₽</button>
                <button class="price-btn" data-min="25000" data-max="">от 25 000₽</button>
            </div>

            <!-- Search -->
            <div class="search-bar">
                <input type="text" id="search" placeholder="Поиск..." />
            </div>

            <!-- Products grid -->
            <div class="products" id="products"></div>

            <!-- Load more -->
            <div class="load-more" id="load-more" style="display:none;">
                <button class="btn-load-more" id="btn-load-more">Загрузить ещё</button>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- ===== PRODUCT DETAIL SCREEN ===== -->
        <div class="screen" id="screen-product" style="display:none;"></div>

        <!-- ===== CART SCREEN ===== -->
        <div class="screen" id="screen-cart" style="display:none;"></div>

        <!-- ===== ORDER FORM SCREEN ===== -->
        <div class="screen" id="screen-order" style="display:none;"></div>

        <!-- ===== ORDER SUCCESS SCREEN ===== -->
        <div class="screen" id="screen-success" style="display:none;"></div>

        <!-- ===== INFO SCREEN ===== -->
        <div class="screen" id="screen-info" style="display:none;"></div>

        <!-- ===== SIDE MENU ===== -->
        <div class="side-menu-overlay" id="side-menu-overlay" onclick="closeMenu()"></div>
        <aside class="side-menu" id="side-menu" aria-label="Боковое меню">
            <div class="side-menu__header">
                <button class="side-menu__close side-menu__close--open" onclick="closeMenu()" aria-label="Закрыть меню">
                    <span></span><span></span><span></span><span></span>
                </button>
            </div>
            <nav class="side-menu__nav">
                <button class="side-menu__link" data-menu-target="catalog" onclick="menuOpenCatalog()">Каталог</button>
                <button class="side-menu__link" data-menu-target="about" onclick="menuOpenInfo('about')">О нас</button>
                <button class="side-menu__link" data-menu-target="payment" onclick="menuOpenInfo('payment')">Оплата</button>
                <button class="side-menu__link" data-menu-target="delivery" onclick="menuOpenInfo('delivery')">Доставка</button>
                <button class="side-menu__link" data-menu-target="contacts" onclick="menuOpenInfo('contacts')">Контакты</button>
            </nav>
            <div class="side-menu__footer">
                <div class="side-menu__socials">
                    <a class="side-menu__icon-link" href="https://t.me/plombir_flowers" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M21.2 3.2a1 1 0 0 0-1.04-.16L2.9 10a1 1 0 0 0 .08 1.87l4.5 1.5 1.5 4.5a1 1 0 0 0 .72.66 1 1 0 0 0 .96-.26l2.53-2.57 3.98 2.95a1 1 0 0 0 1.57-.58L22 4.2a1 1 0 0 0-.8-1zM9.4 15.9l-.9-2.7 6.64-6.64-5.74 7.5z"/>
                        </svg>
                    </a>
                    <a class="side-menu__icon-link" href="https://wa.me/79819672833" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 2a10 10 0 0 0-8.66 15l-1.2 4.34 4.45-1.17A10 10 0 1 0 12 2zm0 18a7.96 7.96 0 0 1-4.06-1.1l-.3-.18-2.64.7.71-2.58-.2-.31A8 8 0 1 1 12 20zm4.44-5.9c-.24-.12-1.4-.69-1.62-.77-.22-.08-.37-.12-.53.12-.16.24-.6.76-.74.91-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.95-1.22-.72-.64-1.2-1.44-1.34-1.68-.14-.24-.02-.37.1-.5.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.53-1.28-.73-1.75-.19-.46-.39-.4-.53-.41h-.45a.86.86 0 0 0-.62.3c-.21.24-.82.8-.82 1.95 0 1.15.84 2.26.96 2.42.12.16 1.65 2.52 4 3.54.56.24 1 .39 1.34.5.56.18 1.06.16 1.46.1.45-.07 1.4-.57 1.6-1.12.2-.55.2-1.02.14-1.12-.06-.1-.22-.16-.46-.28z"/>
                        </svg>
                    </a>
                </div>
                <a class="side-menu__call" href="tel:+79819672833">Позвонить нам</a>
            </div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/app/static/app.js?v=37"></script>
</body>
</html>
