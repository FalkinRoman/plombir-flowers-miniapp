<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plombir Flowers</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/app/static/styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header__logo">🌸 Plombir Flowers</div>
            <button class="header__cart" id="btn-cart" onclick="openCart()">
                🛒 <span class="header__cart-badge" id="cart-badge" style="display:none;">0</span>
            </button>
        </header>

        <!-- ===== CATALOG SCREEN ===== -->
        <div class="screen" id="screen-catalog">
            <!-- Categories -->
            <nav class="categories" id="categories">
                <button class="category-btn active" data-id="">Все</button>
            </nav>

            <!-- Price filter -->
            <div class="price-filter" id="price-filter">
                <button class="price-btn active" data-min="" data-max="">Любая цена</button>
                <button class="price-btn" data-min="0" data-max="6000">до 6 000</button>
                <button class="price-btn" data-min="6000" data-max="10000">6–10 тыс</button>
                <button class="price-btn" data-min="10000" data-max="15000">10–15 тыс</button>
                <button class="price-btn" data-min="15000" data-max="25000">15–25 тыс</button>
                <button class="price-btn" data-min="25000" data-max="">от 25 000</button>
            </div>

            <!-- Search -->
            <div class="search-bar">
                <input type="text" id="search" placeholder="Поиск букетов..." />
            </div>

            <!-- Products grid -->
            <div class="products" id="products"></div>

            <!-- Load more -->
            <div class="load-more" id="load-more" style="display:none;">
                <button class="btn-load-more" id="btn-load-more">Показать ещё</button>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- ===== PRODUCT DETAIL SCREEN ===== -->
        <div class="screen" id="screen-product" style="display:none;"></div>

        <!-- ===== CART SCREEN ===== -->
        <div class="screen" id="screen-cart" style="display:none;"></div>

        <!-- ===== ORDER FORM SCREEN ===== -->
        <div class="screen" id="screen-order" style="display:none;"></div>

        <!-- ===== ORDER SUCCESS SCREEN ===== -->
        <div class="screen" id="screen-success" style="display:none;"></div>
    </div>

    <script src="/app/static/app.js"></script>
</body>
</html>
